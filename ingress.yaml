apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: greens-ingress
  namespace: greens
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"

spec:
  ingressClassName: nginx

  rules:
  - http:
      paths:

      # Backend Ping
      - path: /ping
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 80

      # Backend API
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 80

      # Frontend
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
