apiVersion: apps/v1
kind: Deployment
metadata:
  name: greens-backend
  namespace: greens
spec:
  replicas: 2
  selector:
    matchLabels:
      app: greens-backend
  template:
    metadata:
      labels:
        app: greens-backend
    spec:
      containers:
      - name: backend
        image: vinothkumar2003/greenstech-backend:v1
        imagePullPolicy: Always
        ports:
        - containerPort: 8083
        env:
        - name: PORT
          value: "8083"
        readinessProbe:
          httpGet:
            path: /ping
            port: 8083
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /ping
            port: 8083
          initialDelaySeconds: 15
          periodSeconds: 20
